name: RPM Build Reproduction

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-rpms:
    name: Build RPMs (CentOS Stream ${{ matrix.os_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_version: [9, 10]
    container:
      image: quay.io/centos/centos:stream${{ matrix.os_version }}
    steps:
      - name: Checkout openshift/kubernetes
        uses: actions/checkout@v4
        with:
          repository: openshift/kubernetes
          ref: master

      - name: Install Build Toolchain
        run: |
          dnf install -y \
            rpm-build \
            rsync \
            createrepo \
            gcc \
            gcc-c++ \
            make \
            golang \
            krb5-devel \
            bsdtar \
            git

      - name: Build RPMs
        run: |
          echo "Starting real Kubernetes RPM build for CentOS Stream ${{ matrix.os_version }}..."
          
          # Fix git ownership issue in container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # Extract version from Dockerfile.rhel
          VERSION=$(sed -rn 's/.*io.openshift.build.versions="kubernetes=(1.[0-9]+.[0-9]+(-rc.[0-9])?)"/v\1/p' openshift-hack/images/hyperkube/Dockerfile.rhel)
          COMMIT=$(git rev-parse --short HEAD)
          
          export OS_GIT_VERSION="${VERSION}+${COMMIT}"
          export OS_GIT_COMMIT="${COMMIT}"
          export OS_GIT_MAJOR=$(echo $VERSION | cut -d. -f1 | sed 's/v//')
          export OS_GIT_MINOR=$(echo $VERSION | cut -d. -f2)
          export OS_GIT_PATCH=$(echo $VERSION | cut -d. -f3)
          export OS_GIT_TREE_STATE="clean"
          
          ./openshift-hack/build-rpms.sh
          
      - name: Archive RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-rpms-el${{ matrix.os_version }}
          path: _output/local/releases/rpms/
