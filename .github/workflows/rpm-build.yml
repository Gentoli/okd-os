name: RPM Build Reproduction

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-rpms:
    name: Build ${{ matrix.component.name }} (EL${{ matrix.os_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_version: [9]
        component:
          - name: kubernetes
            repository: openshift/kubernetes
            ref: master
            build_script: openshift-hack/build-rpms.sh
            spec_file: openshift.spec
          - name: cri-o
            repository: cri-o/cri-o
            ref: main
            build_script: hack/build-rpms.sh
          - name: cri-tools
            repository: kubernetes-sigs/cri-tools
            ref: master
          - name: oc
            repository: openshift/oc
            ref: main
            spec_file: oc.spec
          - name: conmon-rs
            repository: containers/conmon-rs
            ref: main
          - name: crio-credential-provider
            repository: openshift/crio-credential-provider
            ref: main
            spec_file: crio-credential-provider.spec
    container:
      image: quay.io/centos/centos:stream${{ matrix.os_version }}
    steps:
      - name: Install Git and Toolchain
        run: |
          dnf install -y dnf-plugins-core epel-release epel-next-release
          dnf config-manager --set-enabled crb
          dnf makecache
          dnf install -y \
            git \
            rpm-build \
            rsync \
            createrepo \
            gcc \
            gcc-c++ \
            make \
            golang \
            krb5-devel \
            bsdtar \
            systemd \
            cargo \
            findutils \
            rpkg

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.component.repository }}
          ref: ${{ matrix.component.ref }}
          fetch-depth: 1

      - name: Build RPMs
        run: |
          echo "Starting build for ${{ matrix.component.name }} on CentOS Stream ${{ matrix.os_version }}..."
          
          # Fix git ownership issue in container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # Generic Metadata Extraction
          # Try to get version from tags or commit, fall back to 0.0.1
          COMMIT=$(git rev-parse --short HEAD)
          VERSION_RAW=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.1")
          
          if [ "${{ matrix.component.name }}" == "kubernetes" ]; then
            # Override with Kubernetes specialized versioning if possible
            VERSION_RAW=$(sed -rn 's/.*io.openshift.build.versions="kubernetes=(1.[0-9]+.[0-9]+(-rc.[0-9])?)"/\1/p' openshift-hack/images/hyperkube/Dockerfile.rhel || echo "$VERSION_RAW")
          fi
          
          VERSION="v${VERSION_RAW}"
          export OS_GIT_VERSION="${VERSION}+${COMMIT}"
          export OS_GIT_COMMIT="${COMMIT}"
          export OS_GIT_MAJOR=$(echo $VERSION_RAW | cut -d. -f1)
          export OS_GIT_MINOR=$(echo $VERSION_RAW | cut -d. -f2)
          export OS_GIT_PATCH=$(echo $VERSION_RAW | cut -d. -f3)
          export OS_GIT_TREE_STATE="dirty"
          
          echo "Build Metadata:"
          echo "  OS_GIT_VERSION: $OS_GIT_VERSION"

          # Install goversioninfo (missing in EL9 repos but needed by oc)
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          export PATH=$PATH:$(go env GOPATH)/bin

          # Install build dependencies if spec exists
          if [ -n "${{ matrix.component.spec_file }}" ]; then
            SPEC="${{ matrix.component.spec_file }}"
            # Hack for oc: remove goversioninfo dependency if not in repo
            if [ "$SPEC" == "oc.spec" ]; then
              sed -i '/BuildRequires:.*goversioninfo/d' "$SPEC"
            fi
            dnf builddep -y "$SPEC"
          fi

          if [ -n "${{ matrix.component.build_script }}" ]; then
            echo "Using explicit build script: ${{ matrix.component.build_script }}"
            chmod +x "${{ matrix.component.build_script }}"
            ./${{ matrix.component.build_script }}
          elif [ -f "Makefile" ] && make -n rpm >/dev/null 2>&1; then
            echo "Makefile has rpm target, using make rpm..."
            make rpm
          elif [ -n "${{ matrix.component.spec_file }}" ]; then
            echo "Falling back to manual rpmbuild with ${{ matrix.component.spec_file }}..."
            SPEC="${{ matrix.component.spec_file }}"
            NAME=$(rpmspec -q --qf "%{name}\n" "$SPEC" | head -n 1)
            VERSION_SPEC=$(rpmspec -q --qf "%{version}\n" "$SPEC" | head -n 1)
            mkdir -p _rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
            tar -czf "_rpmbuild/SOURCES/${NAME}-${VERSION_SPEC}.tar.gz" --exclude='.git' --transform="s|^.|$NAME-$VERSION_SPEC|" ./
            rpmbuild -ba "$SPEC" --define "_topdir $PWD/_rpmbuild" --define "version $VERSION_RAW" --define "release 1" --define "commit $COMMIT"
          else
            echo "No build script, Makefile rpm target, or .spec file defined."
            exit 1
          fi
          
      - name: Archive RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component.name }}-rpms-el${{ matrix.os_version }}
          path: |
            _output/local/releases/rpms/
            _output/releases/rpms/
            RPMS/
            _rpmbuild/RPMS/
          if-no-files-found: warn
