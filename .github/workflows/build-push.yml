name: Build and Push Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '6.12.0-243.el10'
      release_image:
        description: 'Release image to extract base images from'
        required: false
        default: 'quay.io/okd/scos-release@sha256:ea8a1ccc0173d6d880a7ce880b11f954fa18fda74afe8c2ce7ce48086e94101b'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  extract-base-images:
    runs-on: ubuntu-latest
    outputs:
      stream-coreos: ${{ steps.extract.outputs.stream-coreos }}
      driver-toolkit: ${{ steps.extract.outputs.driver-toolkit }}
    steps:
      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Extract base images
        id: extract
        run: |
          PAYLOAD="${{ github.event.inputs.release_image || 'quay.io/okd/scos-release@sha256:ea8a1ccc0173d6d880a7ce880b11f954fa18fda74afe8c2ce7ce48086e94101b' }}"
          echo "stream-coreos=$(oc adm release info --image-for stream-coreos $PAYLOAD)" >> $GITHUB_OUTPUT
          echo "driver-toolkit=$(oc adm release info --image-for driver-toolkit $PAYLOAD)" >> $GITHUB_OUTPUT

  build-and-push:
    needs: extract-base-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image_name: stream-coreos
          - dockerfile: Dockerfile.dtk
            image_name: driver-toolkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Version
        run: echo "VERSION=${{ github.event.inputs.version || '6.12.0-243.el10' }}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BASE_IMAGE=${{ needs.extract-base-images.outputs[matrix.image_name] }}
